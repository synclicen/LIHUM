name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with "Workers Scripts: Edit"
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID (find at dash.cloudflare.com, it's in the URL)
#   TURSO_AUTH_TOKEN      — Turso database auth token

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with OpenNext
        run: bun run build:cloudflare

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Set TURSO_AUTH_TOKEN as Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: echo "$TURSO_AUTH_TOKEN" | npx wrangler secret put TURSO_AUTH_TOKEN

      - name: Summary
        run: |
          echo "### Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Worker `lihum` deployed to Cloudflare." >> $GITHUB_STEP_SUMMARY
          echo "DATABASE_URL is set via wrangler.jsonc vars." >> $GITHUB_STEP_SUMMARY
          echo "TURSO_AUTH_TOKEN is set as a Worker secret." >> $GITHUB_STEP_SUMMARY
